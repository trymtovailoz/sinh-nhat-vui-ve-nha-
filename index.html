<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Gift</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    overflow:hidden;
}

/* ===== TRANG 1 - SAO ===== */
.stars{
    position:fixed;
    width:100%;
    height:100vh;
    background:radial-gradient(circle at bottom,#0d1b2a,#000);
    overflow:hidden;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle{
    from{opacity:0.3;}
    to{opacity:1;}
}

/* Nút mở quà */
button{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    padding:20px 50px;
    font-size:22px;
    border:none;
    border-radius:50px;
    cursor:pointer;
    background:linear-gradient(45deg,#ff00cc,#3333ff);
    color:white;
    box-shadow:0 0 20px #ff00cc;
    transition:0.3s;
}

button:hover{
    transform:translate(-50%,-50%) scale(1.1);
}

/* ===== TRANG 2 ===== */
.second{
    display:none;
    position:fixed;
    width:100%;
    height:100vh;
    background:radial-gradient(circle at top,#1b2735,#090a0f);
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

/* chữ */
h1{
    text-align:center;
}

h1 span{
    display:inline-block;
    font-size:65px;
    font-weight:bold;
    color:white;

    text-shadow:
        0 0 5px rgba(255,255,255,0.6),
        0 0 10px rgba(255,255,255,0.4),
        0 0 20px rgba(255,255,255,0.2);

    animation: float 2s ease-in-out infinite;
}

@keyframes float{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* hình ảnh */
img{
    margin-top:40px;
    width:250px;
    border-radius:20px;
    display:none;
    animation: fadeIn 2s forwards;
}

@keyframes fadeIn{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}
</style>
</head>
<body>

<!-- Trang 1 -->
<div class="stars" id="page1">
    <button onclick="openGift()">🎁 Mở quà</button>
</div>

<!-- Trang 2 -->
<div class="second" id="page2">
    <h1 id="text"></h1>
    <!-- 🔁 ĐỔI LINK HÌNH Ở ĐÂY -->
    <img id="photo" src="z7134425590759_35b66c7caa804a511f10dbd02c2e9991.jpg">
</div>

<script>
/* TẠO SAO */
for(let i=0;i<200;i++){
    let star=document.createElement("div");
    star.className="star";
    star.style.top=Math.random()*100+"%";
    star.style.left=Math.random()*100+"%";
    star.style.animationDuration=(Math.random()*3+1)+"s";
    document.getElementById("page1").appendChild(star);
}

/* MỞ QUÀ */
function openGift(){
    document.getElementById("page1").style.display="none";
    document.getElementById("page2").style.display="flex";
    createText();

    setTimeout(()=>{
        document.getElementById("photo").style.display="block";
    },2000);
}

/* TẠO CHỮ */
function createText(){
    const message="HAPPY BIRTHDAY";
    const text=document.getElementById("text");
    text.innerHTML="";

    message.split("").forEach((char,i)=>{
        let span=document.createElement("span");
        span.textContent=char;
        span.style.animationDelay=i*0.15+"s";
        text.appendChild(span);
    });
}
</script>

</body>
</html>
